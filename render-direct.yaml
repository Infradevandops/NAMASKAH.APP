services:
  - type: web
    name: namaskah-app
    env: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      echo "✅ Build completed"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: namaskah-db
          property: connectionString
      - key: USE_MOCK_TWILIO
        value: "true"
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: "production"

databases:
  - name: namaskah-db
    databaseName: namaskah
    user: namaskah