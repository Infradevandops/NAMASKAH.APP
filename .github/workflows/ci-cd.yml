name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Backend Testing and Quality Checks
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run database migrations
      run: |
        export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/test_db"
        python -m alembic upgrade head

    - name: Run backend tests
      run: |
        export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/test_db"
        export REDIS_URL="redis://localhost:6379/0"
        export ENVIRONMENT="testing"
        python -m pytest --cov=. --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: backend
        name: backend-coverage

    - name: Security scan with Bandit
      run: |
        pip install bandit
        bandit -r . -f json -o bandit-report.json || true

    - name: Upload Bandit results
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.json

  # Frontend Testing and Quality Checks
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Run frontend linting
      run: |
        cd frontend
        npm run lint

    - name: Run frontend tests
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false

    - name: Build frontend
      run: |
        cd frontend
        npm run build

    - name: Upload frontend coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  # Integration Tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run database migrations
      run: |
        export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/test_db"
        python -m alembic upgrade head

    - name: Run enterprise feature tests
      run: |
        export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/test_db"
        export REDIS_URL="redis://localhost:6379/0"
        export ENVIRONMENT="testing"
        python -m pytest test_enterprise_features.py -v

    - name: Run API integration tests
      run: |
        export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/test_db"
        export REDIS_URL="redis://localhost:6379/0"
        export ENVIRONMENT="testing"
        python -c "
        from main import app
        from fastapi.testclient import TestClient
        import time

        client = TestClient(app)

        # Test health endpoint
        response = client.get('/health')
        assert response.status_code == 200
        print('✅ Health check passed')

        # Test enterprise endpoints
        endpoints = ['/api/tenants', '/api/rbac/roles', '/api/calls']
        for endpoint in endpoints:
            response = client.get(endpoint)
            # Should return 401 without auth, which is expected
            assert response.status_code in [200, 401, 403]
            print(f'✅ {endpoint} accessible')

        print('✅ All integration tests passed')
        "

  # Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    needs: [backend-tests]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Dependency vulnerability scan
      run: |
        pip install safety
        safety check --output json > safety-report.json || true

    - name: Upload Safety results
      uses: actions/upload-artifact@v4
      with:
        name: safety-report
        path: safety-report.json

  # Performance Testing
  performance-test:
    runs-on: ubuntu-latest
    needs: [integration-tests]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install locust

    - name: Run performance tests
      run: |
        # Simple performance test - can be expanded
        python -c "
        import time
        from main import app
        from fastapi.testclient import TestClient

        client = TestClient(app)

        # Warm up
        client.get('/health')

        # Performance test
        start_time = time.time()
        for i in range(100):
            response = client.get('/health')
            assert response.status_code == 200

        end_time = time.time()
        total_time = end_time - start_time
        avg_time = total_time / 100

        print(f'✅ Performance test completed')
        print(f'   Total time: {total_time:.2f}s')
        print(f'   Average response time: {avg_time:.4f}s')
        print(f'   Requests per second: {100/total_time:.2f}')

        # Assert reasonable performance
        assert avg_time < 0.1, f'Average response time too slow: {avg_time:.4f}s'
        "

  # Deploy to Staging (only on main branch)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, integration-tests, security-scan, performance-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Railway (Staging)
      run: |
        echo "🚀 Deploying to Railway staging environment"
        # Railway deployment would be configured here
        # This is a placeholder for actual Railway CLI deployment

    - name: Health check staging deployment
      run: |
        echo "🔍 Performing health checks on staging deployment"
        # Health checks would be performed here

    - name: Notify deployment status
      run: |
        echo "📢 Staging deployment completed"
        # Slack/Discord notifications would be configured here

  # Production Deployment (manual trigger)
  deploy-production:
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Render (Production)
      run: |
        echo "🚀 Deploying to Render production environment"
        # Render deployment would be configured here
        # This is a placeholder for actual Render deployment

    - name: Run production smoke tests
      run: |
        echo "🧪 Running production smoke tests"
        # Production smoke tests would be run here

    - name: Notify production deployment
      run: |
        echo "📢 Production deployment completed"
        # Production deployment notifications

  # Documentation Update
  update-docs:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate API documentation
      run: |
        pip install -r requirements.txt
        python -c "
        from main import app
        from fastapi.openapi.utils import get_openapi

        openapi_schema = get_openapi(
            title=app.title,
            version=app.version,
            description=app.description,
            routes=app.routes,
        )

        import json
        with open('api-docs.json', 'w') as f:
            json.dump(openapi_schema, f, indent=2)

        print('✅ API documentation generated')
        "

    - name: Upload API docs
      uses: actions/upload-artifact@v4
      with:
        name: api-docs
        path: api-docs.json

    - name: Update README with build status
      run: |
        echo "✅ CI/CD pipeline completed successfully"
        # README updates would be handled here
