version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.simple
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/app.db}
      - TEXTVERIFIED_API_KEY=${TEXTVERIFIED_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
      - USE_MOCK_TWILIO=${USE_MOCK_TWILIO:-false}
      - USE_MOCK_TEXTVERIFIED=${USE_MOCK_TEXTVERIFIED:-false}
      - DEBUG=false
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Optional: Add PostgreSQL for production
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=namaskah
      - POSTGRES_USER=namaskah
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    profiles: ["with-db"]

  # Optional: Add Redis for caching
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["with-cache"]

volumes:
  postgres_data: